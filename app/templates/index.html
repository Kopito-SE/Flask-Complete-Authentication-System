<!DOCTYPE html>
<html>
<head>

<title>Auth System</title>

<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

<div class="container">

<h2>Authentication</h2>

<div class="tabs">
<button onclick="showTab('register')">Register</button>
<button onclick="showTab('verify')">Verify Email</button>
<button onclick="showTab('login')">Login</button>
<button onclick="showTab('reset_request')">Reset Password</button>
</div>


<!-- REGISTER -->
<div id="register" class="tab">

<input id="reg_email" placeholder="Email">
<input id="reg_username" placeholder="Username">
<input type="password" id="reg_password" placeholder="Password">

<button onclick="register()">Register</button>

</div>


<!-- VERIFY EMAIL -->
<div id="verify" class="tab hidden">

<input id="verify_email" placeholder="Email">
<input id="verify_code" placeholder="Verification Code">

<button onclick="verifyEmail()">Verify Email</button>
<button onclick="resendCode()">Resend Code</button>

</div>


<!-- LOGIN -->
<div id="login" class="tab hidden">

<input id="login_username" placeholder="Username">
<input type="password" id="login_password" placeholder="Password">

<button onclick="login()">Login</button>

<a href="/api/auth/login/google">
<button class="google">Login with Google</button>
</a>

</div>


<!-- REQUEST RESET -->
<div id="reset_request" class="tab hidden">

<input id="reset_email" placeholder="Email">

<button onclick="requestReset()">Send Reset Code</button>

</div>


<!-- RESET PASSWORD -->
<div id="reset_password" class="tab hidden">

<input id="reset_email2" placeholder="Email">
<input id="reset_code" placeholder="Code">
<input type="password" id="new_password" placeholder="New Password">

<button onclick="resetPassword()">Reset Password</button>

</div>


<div id="message"></div>

</div>

<script src="{{ url_for('static', filename='js/auth.js') }}"></script>

</body>
</html>
